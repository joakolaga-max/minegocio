<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>MiNegocio</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#f1f5f9;font-family:system-ui,sans-serif}
    .spinner{width:44px;height:44px;border:4px solid #1e2230;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px">
      <div class="spinner"></div>
      <div style="color:#6b7280;font-size:14px">Iniciando MiNegocio...</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyDpiL65zimS-hmdtaWocyCxUhsyQ0rITHM",
      authDomain: "mi-negocio-d3d2c.firebaseapp.com",
      projectId: "mi-negocio-d3d2c",
      storageBucket: "mi-negocio-d3d2c.firebasestorage.app",
      messagingSenderId: "301429118303",
      appId: "1:301429118303:web:d67ee5239378746d8252ea"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ── Firebase helpers with per-user path ──
    window.__fb = {
      save: async (path, data) => {
        try { localStorage.setItem("mn_" + path, JSON.stringify(data)); } catch(e) {}
        if (!window.__user) return;
        try {
          await setDoc(
            doc(db, "negocios", window.__user, "data", path),
            { data: JSON.stringify(data) },
            { merge: true }
          );
        } catch(e) { console.warn("Save error:", path, e); }
      },

      load: async (path) => {
        if (!window.__user) return null;
        try {
          // Try new per-user path first
          const snap = await getDoc(doc(db, "negocios", window.__user, "data", path));
          if (snap.exists()) {
            const val = JSON.parse(snap.data().data);
            try { localStorage.setItem("mn_" + path, JSON.stringify(val)); } catch(e) {}
            return val;
          }
          // Fallback: try old shared path and migrate
          const oldSnap = await getDoc(doc(db, "negocio", path));
          if (oldSnap.exists()) {
            const val = JSON.parse(oldSnap.data().data);
            // Migrate to new path
            await setDoc(doc(db, "negocios", window.__user, "data", path), { data: JSON.stringify(val) }, { merge: true });
            try { localStorage.setItem("mn_" + path, JSON.stringify(val)); } catch(e) {}
            console.log("Migrated:", path);
            return val;
          }
        } catch(e) { console.warn("Load error:", path, e); }
        // Last resort: localStorage
        try {
          const cached = localStorage.getItem("mn_" + path);
          return cached ? JSON.parse(cached) : null;
        } catch(e) { return null; }
      }
    };

    // ── Auth actions exposed to React ──
    window.login = async (email, password) => {
      await signInWithEmailAndPassword(auth, email, password);
    };

    window.register = async (email, password) => {
      await createUserWithEmailAndPassword(auth, email, password);
    };

    window.logout = async () => {
      await signOut(auth);
    };

    window.resetPassword = async (email) => {
      await sendPasswordResetEmail(auth, email);
    };

    // ── Watch auth state ──
    onAuthStateChanged(auth, (user) => {
      window.__user = user ? user.uid : null;
      window.__authReady = true;
      window.dispatchEvent(new Event("authReady"));
    });

    window.__fbReady = true;
    window.dispatchEvent(new Event("fbReady"));
  </script>

  <script src="app_compiled.js"></script>
</body>
</html>
